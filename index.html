<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kekarav S1-32 Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/kekarav-s132/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi bi-kanban"></i> Kekarav S1-32 Manager</span>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-light btn-sm" onclick="openManageUsersModal()">
                    <i class="bi bi-people"></i> Users
                </button>
                <button class="btn btn-outline-light btn-sm" onclick="exportData()">
                    <i class="bi bi-download"></i> Export
                </button>
                <label class="btn btn-outline-light btn-sm mb-0">
                    <i class="bi bi-upload"></i> Import
                    <input type="file" accept=".json" onchange="importData(event)" style="display: none;">
                </label>
                <button class="btn btn-light btn-sm" onclick="openCreateTaskModal()">
                    <i class="bi bi-plus-lg"></i> Create Task
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-3">
            <div class="col">
                <div class="board-column" data-state="New">
                    <div class="board-column-header text-secondary">
                        <i class="bi bi-circle"></i> New <span class="badge bg-secondary" id="count-New">0</span>
                    </div>
                    <div id="column-New" class="p-2 drop-zone" data-state="New"></div>
                </div>
            </div>
            <div class="col">
                <div class="board-column" data-state="InProgress">
                    <div class="board-column-header text-primary">
                        <i class="bi bi-play-circle"></i> In Progress <span class="badge bg-primary" id="count-InProgress">0</span>
                    </div>
                    <div id="column-InProgress" class="p-2 drop-zone" data-state="InProgress"></div>
                </div>
            </div>
            <div class="col">
                <div class="board-column" data-state="Completed">
                    <div class="board-column-header text-success">
                        <i class="bi bi-check-circle"></i> Completed <span class="badge bg-success" id="count-Completed">0</span>
                    </div>
                    <div id="column-Completed" class="p-2 drop-zone" data-state="Completed"></div>
                </div>
            </div>
            <div class="col">
                <div class="board-column" data-state="Reviewed">
                    <div class="board-column-header text-purple">
                        <i class="bi bi-eye"></i> Reviewed <span class="badge bg-purple" id="count-Reviewed">0</span>
                    </div>
                    <div id="column-Reviewed" class="p-2 drop-zone" data-state="Reviewed"></div>
                </div>
            </div>
            <div class="col">
                <div class="board-column" data-state="Done">
                    <div class="board-column-header text-teal">
                        <i class="bi bi-check-all"></i> Done <span class="badge bg-teal" id="count-Done">0</span>
                    </div>
                    <div id="column-Done" class="p-2 drop-zone" data-state="Done"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div class="modal fade" id="createTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-circle"></i> Create New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="newTaskTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="newTaskDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Deadline</label>
                        <input type="date" class="form-control" id="newTaskDeadline">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Assignee</label>
                        <select class="form-select" id="newTaskAssignee"></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createTask()">Create Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div class="modal fade" id="taskDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <span class="task-id me-2" id="detailTaskId"></span>
                        <span id="detailTaskTitle"></span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-8">
                            <h6>Description</h6>
                            <p id="detailTaskDescription" class="text-muted"></p>

                            <hr>

                            <h6><i class="bi bi-chat-dots"></i> Comments</h6>
                            <div id="commentsSection"></div>

                            <div class="mt-3">
                                <div class="input-group">
                                    <select class="form-select" id="commentAuthor" style="max-width: 150px;"></select>
                                    <input type="text" class="form-control" id="newComment" placeholder="Add a comment..." onkeypress="if(event.key==='Enter') addComment()">
                                    <button class="btn btn-outline-primary" onclick="addComment()">
                                        <i class="bi bi-send"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-body">
                                    <h6 class="card-title">Details</h6>

                                    <div class="mb-3">
                                        <label class="form-label small text-muted">Status</label>
                                        <div id="detailTaskState"></div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label small text-muted">Assignee</label>
                                        <select class="form-select form-select-sm" id="detailTaskAssignee" onchange="updateAssignee()"></select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label small text-muted">Deadline</label>
                                        <input type="date" class="form-control form-control-sm" id="detailTaskDeadline" onchange="updateDeadline()">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label small text-muted">Created</label>
                                        <div id="detailTaskCreated" class="small"></div>
                                    </div>

                                    <hr>

                                    <label class="form-label small text-muted">Transition</label>
                                    <div id="transitionButtons"></div>
                                </div>
                            </div>

                            <div class="card mt-3">
                                <div class="card-body">
                                    <h6 class="card-title"><i class="bi bi-clock-history"></i> State History</h6>
                                    <div id="stateHistory" class="state-history-container"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="deleteTask()">
                        <i class="bi bi-trash"></i> Delete Task
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Manage Users Modal -->
    <div class="modal fade" id="manageUsersModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-people"></i> Manage Users</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="usersList"></div>
                    <hr>
                    <h6>Add New User</h6>
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="text" class="form-control form-control-sm" id="newUserName" placeholder="Name">
                        </div>
                        <div class="col-4">
                            <input type="text" class="form-control form-control-sm" id="newUserRole" placeholder="Role">
                        </div>
                        <div class="col-2">
                            <button class="btn btn-primary btn-sm w-100" onclick="addUser()">
                                <i class="bi bi-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/kekarav-s132/app.js"></script>
</body>
</html>
